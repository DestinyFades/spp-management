version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: spp_postgres
    environment:
      POSTGRES_DB: spp
      POSTGRES_USER: spp_user
      POSTGRES_PASSWORD: spp_pass_123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    networks:
      - spp_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spp_user -d spp"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: spp_redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb
    volumes:
      - redis_data:/data
    networks:
      - spp_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: spp_backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://spp_user:spp_pass_123@postgres:5432/spp
      REDIS_URL: redis://redis:6379
      SECRET_KEY: test_secret_key
    volumes:
      - ./backend:/app
      - /app/__pycache__
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - spp_network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    container_name: spp_frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
      NEXT_PUBLIC_SSE_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    networks:
      - spp_network
    command: npm run dev

volumes:
  postgres_data:
  redis_data:

networks:
  spp_network:
    driver: bridge
